# Secret-scanning pre-commit hook. Install once per clone:
#   pipx install pre-commit   (or: brew install pre-commit)
#   pre-commit install
# Thereafter every `git commit` is scanned for committed secrets (API keys,
# tokens, private keys) and blocked before they ever reach history.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
