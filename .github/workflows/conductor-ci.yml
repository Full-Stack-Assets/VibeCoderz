name: Conductor CI

# Repo-owned CI for the Conductor workspace. Pins pnpm explicitly via
# pnpm/action-setup@v4's `version` input (belt-and-suspenders with the
# `packageManager` field in package.json) so it never hits the
# "No pnpm version is specified" failure.

on:
  push:
    branches: [main]
    paths:
      - 'conductor/**'
      - '.github/workflows/conductor-ci.yml'
  pull_request:
    paths:
      - 'conductor/**'
      - '.github/workflows/conductor-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conductor
    steps:
      - uses: actions/checkout@v4
        with:
          # This job only reads code and runs tests — it never pushes — so don't
          # leave the checkout token persisted in .git/config in the workspace.
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: conductor/pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Test (all workspace packages)
        run: pnpm -r test
