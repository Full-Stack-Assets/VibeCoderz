name: Secret scan

# Backstop for the local pre-commit gitleaks hook (.pre-commit-config.yaml):
# scans pushes and PRs for committed secrets so anything that bypasses the
# local hook is still caught in CI.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
