name: Configure Conductor Vercel project

# Conductor deploys via Vercel's NATIVE Git integration (the `conductor`
# project). This workflow (idempotently) sets that project's Root Directory to
# `conductor/apps/web` via the Vercel API so native builds resolve, and dumps the
# latest deployment's build logs for diagnosis.
#
# Requires the repo secret VERCEL_TOKEN. No CLI deploy here — Vercel's git
# integration owns deployments (preview per PR, production on main).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-conductor-vercel.yml'

concurrency:
  group: conductor-vercel-config
  cancel-in-progress: true

jobs:
  configure:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Project id + team slug live in repo/org GitHub Variables (Settings →
      # Secrets and variables → Actions → Variables), not hardcoded here, so the
      # workflow is portable across forks/environments without code edits.
      PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      TEAM_SLUG: ${{ vars.VERCEL_TEAM_SLUG }}
    steps:
      - name: Set Root Directory on the conductor project
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping (no-op)."
            exit 0
          fi
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X PATCH \
            "https://api.vercel.com/v9/projects/${PROJECT_ID}?slug=${TEAM_SLUG}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory":"conductor/apps/web","framework":"nextjs"}')
          echo "HTTP $code"
          test "$code" = "200"
          echo "rootDirectory set to: $(jq -r '.rootDirectory' /tmp/resp.json)"

      - name: Dump latest conductor deployment build logs
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "no token"; exit 0; fi
          dep=$(curl -sS -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&slug=${TEAM_SLUG}&limit=1")
          id=$(printf '%s' "$dep" | jq -r '.deployments[0].uid')
          state=$(printf '%s' "$dep" | jq -r '.deployments[0].state')
          echo "latest deployment: $id  state: $state"
          echo "===== BUILD LOGS (tail) ====="
          curl -sS -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v3/deployments/${id}/events?builds=1&limit=400" \
            | jq -r '.. | .text? // empty' | tail -n 90
