name: Configure Conductor Vercel project

# Conductor deploys via Vercel's NATIVE Git integration (the `conductor`
# project). That project was auto-created with Root Directory = repo root, which
# makes its builds fail. This workflow sets the Root Directory to
# `conductor/apps/web` via the Vercel API so the native builds succeed (Next.js +
# the parent pnpm workspace are then auto-detected). It is idempotent and
# self-heals on push to main.
#
# Requires the repo secret VERCEL_TOKEN (already configured). No CLI deploy here —
# Vercel's git integration owns deployments (preview per PR, production on main).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-conductor-vercel.yml'

concurrency:
  group: conductor-vercel-config
  cancel-in-progress: true

jobs:
  configure:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      PROJECT_ID: prj_y8NXnCPK2lCZJeq1fYTSU37UhLg5
      TEAM_SLUG: full-stack-assets-projects
    steps:
      - name: Set Root Directory on the conductor project
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping (no-op)."
            exit 0
          fi
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X PATCH \
            "https://api.vercel.com/v9/projects/${PROJECT_ID}?slug=${TEAM_SLUG}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory":"conductor/apps/web","framework":"nextjs"}')
          echo "HTTP $code"
          head -c 600 /tmp/resp.json; echo
          test "$code" = "200"
          echo "✓ conductor rootDirectory set to conductor/apps/web"

      - name: Dump latest conductor deployment build logs
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "no token"; exit 0; fi
          dep=$(curl -sS -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&slug=${TEAM_SLUG}&limit=1")
          id=$(printf '%s' "$dep" | python3 -c "import sys,json;d=json.load(sys.stdin)['deployments'][0];print(d.get('uid') or d.get('id'))")
          state=$(printf '%s' "$dep" | python3 -c "import sys,json;print(json.load(sys.stdin)['deployments'][0].get('state'))")
          echo "latest deployment: $id  state: $state"
          echo "===== BUILD LOGS ====="
          curl -sS -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v3/deployments/${id}/events?builds=1&limit=300" \
            | python3 -c "import sys,json
data=json.load(sys.stdin)
rows=data if isinstance(data,list) else data.get('events',[])
for e in rows:
    t=e.get('text') or (e.get('payload') or {}).get('text') or ''
    if t: print(t)" | tail -n 80
