name: Deploy Conductor to Vercel

# Deploys conductor/apps/web to Vercel.
#
# ZERO-DASHBOARD SETUP: add a single repo secret `VERCEL_TOKEN`
# (Settings → Secrets and variables → Actions). On the next push to main that
# touches conductor/** — or a manual run — the Vercel CLI creates a NEW project
# named "conductor" and deploys it to production. No project needs to exist
# first. Optionally set VERCEL_ORG_ID / VERCEL_PROJECT_ID to target an existing
# project/scope instead.

on:
  push:
    branches: [main]
    paths:
      - 'conductor/**'
      - '.github/workflows/deploy-conductor-vercel.yml'
  workflow_dispatch:

concurrency:
  group: conductor-vercel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Skip if no token configured
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret not set — skipping deploy (no-op)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.guard.outputs.skip == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.guard.outputs.skip == 'false'
        run: npm install -g vercel@latest

      - name: Deploy (Vercel builds remotely from the monorepo root)
        if: steps.guard.outputs.skip == 'false'
        working-directory: conductor
        run: |
          # Deploy from the workspace root so the whole pnpm monorepo is uploaded
          # and Vercel builds it in its own environment (no prebuilt/symlink
          # hydration issues). conductor/vercel.json sets framework + build/output.
          # --yes accepts inferred settings and creates the "conductor" project on
          # first run.
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" | tee /tmp/deploy.txt
          echo "DEPLOY_URL=$(tail -n1 /tmp/deploy.txt)" >> "$GITHUB_OUTPUT"
